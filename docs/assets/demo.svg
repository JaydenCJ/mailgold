<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="460" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">mailgold — record · check · lint</text>

  <text x="24" y="64" fill="#7ee787">$ mailgold record examples/welcome.eml</text>
  <text x="24" y="84" fill="#c9d1d9">recorded welcome -&gt; .mailgold/welcome.snap (html 57 lines, text 12 lines)</text>

  <text x="24" y="116" fill="#7ee787">$ mailgold check</text>
  <text x="24" y="136" fill="#c9d1d9"><tspan fill="#28c840">ok</tspan>      welcome   <tspan fill="#8b949e"># new send, new token — still passes</tspan></text>
  <text x="24" y="156" fill="#c9d1d9">1 snapshot: 1 ok</text>

  <text x="24" y="188" fill="#7ee787">$ mailgold check   <tspan fill="#8b949e"># after someone &quot;just tweaked the template&quot;</tspan></text>
  <text x="24" y="208" fill="#c9d1d9"><tspan fill="#f85149">FAIL</tspan>    welcome (html)</text>
  <text x="24" y="228" fill="#8b949e">@@ -22,7 +22,7 @@</text>
  <text x="24" y="248" fill="#f85149" xml:space="preserve">-      please confirm your email address within 24 hours.</text>
  <text x="24" y="268" fill="#28c840" xml:space="preserve">+      please confirm your email address within 48 hours.</text>

  <text x="24" y="300" fill="#7ee787">$ mailgold lint emails/promo.html --client outlook</text>
  <text x="24" y="320" fill="#c9d1d9">promo.html:9   <tspan fill="#f85149">error</tspan>  no-css-flexbox          display: flex is ignored by Outlook</text>
  <text x="24" y="340" fill="#c9d1d9">promo.html:10  <tspan fill="#d29922">warn</tspan>   no-border-radius        corners render square there</text>
  <text x="24" y="360" fill="#c9d1d9">promo.html:11  <tspan fill="#f85149">error</tspan>  img-missing-dimensions  &lt;img&gt; without width and height</text>
  <text x="24" y="380" fill="#c9d1d9">promo.html:15  <tspan fill="#f85149">error</tspan>  no-button               &lt;button&gt; is not rendered by Outlook</text>
  <text x="24" y="400" fill="#c9d1d9">3 errors, 1 warning</text>

  <text x="24" y="432" fill="#8b949e">offline · zero dependencies · exit codes made for CI</text>
</svg>
